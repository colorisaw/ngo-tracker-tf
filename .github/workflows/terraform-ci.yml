name: Terraform CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  fmt-validate:
    name: Format & Validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.5.0"

      - name: Terraform fmt
        run: terraform fmt -check -recursive

      - name: Terraform init (sem backend)
        run: terraform init -backend=false

      - name: Terraform validate
        run: terraform validate

  plan-localstack:
    name: Plan (LocalStack)
    runs-on: ubuntu-latest
    needs: fmt-validate
    steps:
      - uses: actions/checkout@v4

      # secrets não pode ser usado em `if:` no nível de job — checar aqui
      - name: Verificar secret LOCALSTACK_AUTH_TOKEN
        id: localstack
        env:
          LOCALSTACK_AUTH_TOKEN: ${{ secrets.LOCALSTACK_AUTH_TOKEN }}
        run: |
          if [ -n "$LOCALSTACK_AUTH_TOKEN" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "Secret LOCALSTACK_AUTH_TOKEN não configurado — pulando plan LocalStack."
          fi

      - uses: hashicorp/setup-terraform@v3
        if: steps.localstack.outputs.enabled == 'true'
        with:
          terraform_version: "1.5.0"

      - name: Subir LocalStack
        if: steps.localstack.outputs.enabled == 'true'
        env:
          LOCALSTACK_AUTH_TOKEN: ${{ secrets.LOCALSTACK_AUTH_TOKEN }}
        run: |
          docker run -d --name localstack \
            -p 4566:4566 \
            -v /var/run/docker.sock:/var/run/docker.sock \
            -e LOCALSTACK_AUTH_TOKEN="${LOCALSTACK_AUTH_TOKEN}" \
            -e SERVICES=s3,dynamodb,iam,sts,lambda,logs \
            localstack/localstack
          sleep 15
          curl -sf http://localhost:4566/_localstack/health

      - name: Bootstrap bucket de state
        if: steps.localstack.outputs.enabled == 'true'
        run: |
          export AWS_ACCESS_KEY_ID=test AWS_SECRET_ACCESS_KEY=test AWS_DEFAULT_REGION=us-east-1
          aws s3 mb s3://sre-terraform-state-local --endpoint-url=http://localhost:4566 2>/dev/null || true

      - name: Terraform init & plan
        if: steps.localstack.outputs.enabled == 'true'
        run: |
          terraform init -backend-config=config/backend.local.hcl
          terraform plan -input=false -var-file=terraform.tfvars.example
