services:
  localstack:
    container_name: localstack
    image: localstack/localstack
    ports:
      - "4566:4566"
    environment:
      LOCALSTACK_AUTH_TOKEN: ${LOCALSTACK_AUTH_TOKEN:?Defina LOCALSTACK_AUTH_TOKEN antes de subir}
      SERVICES: s3,dynamodb,ec2,iam,sts,lambda,logs
      PERSISTENCE: "1"
      DEBUG: ${DEBUG:-0}
    volumes:
      - localstack-data:/var/lib/localstack
      - /var/run/docker.sock:/var/run/docker.sock

volumes:
  localstack-data:
